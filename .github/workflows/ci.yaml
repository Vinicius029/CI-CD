name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar Testes
        run: npm test

      - name: Build
        run: npm run build
